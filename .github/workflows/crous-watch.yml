name: Crous Watch

on:
  schedule:
    # Toutes les 5 minutes. GitHub peut retarder légèrement en période de forte charge.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # permet de le lancer manuellement depuis l'onglet Actions

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run watcher
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python crous_watcher.py

      - name: Save updated seen_offers.json
        run: |
          git config user.name "crous-bot"
          git config user.email "crous-bot@users.noreply.github.com"
          git add seen_offers.json
          git diff --quiet --cached || git commit -m "update seen offers [skip ci]"
          git push
